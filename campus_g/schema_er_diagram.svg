<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220">
  <defs>
    <style>
      .bg { fill: #f6f3ea; }
      .card { fill: #fffdf8; stroke: #3b3b3b; stroke-width: 2; rx: 14; ry: 14; }
      .title { fill: #234e52; font-family: Georgia, serif; font-size: 24px; font-weight: 700; }
      .field { fill: #222; font-family: Consolas, monospace; font-size: 16px; }
      .meta { fill: #7a6852; font-family: Segoe UI, sans-serif; font-size: 15px; }
      .line { stroke: #6b7280; stroke-width: 2.5; fill: none; }
      .label { fill: #7c2d12; font-family: Segoe UI, sans-serif; font-size: 15px; font-weight: 600; }
      .heading { fill: #111827; font-family: Segoe UI, sans-serif; font-size: 34px; font-weight: 700; }
      .subheading { fill: #4b5563; font-family: Segoe UI, sans-serif; font-size: 18px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1220" />
  <text class="heading" x="60" y="60">Campus Grievance System ER Diagram</text>
  <text class="subheading" x="60" y="95">PostgreSQL schema view based on Django models in grievance/models.py</text>

  <path class="line" d="M330 205 C380 205, 410 205, 460 205" />
  <text class="label" x="355" y="192">1 to many</text>

  <path class="line" d="M330 285 C380 285, 410 285, 460 285" />
  <text class="label" x="355" y="272">1 to many</text>

  <path class="line" d="M330 365 C380 365, 410 365, 460 365" />
  <text class="label" x="355" y="352">1 to many</text>

  <path class="line" d="M800 285 C900 285, 1010 285, 1120 285" />
  <text class="label" x="905" y="272">1 to many</text>

  <path class="line" d="M800 525 C920 525, 1030 525, 1120 525" />
  <text class="label" x="925" y="512">1 to many</text>

  <path class="line" d="M330 745 C390 745, 410 745, 460 745" />
  <text class="label" x="355" y="732">1 to many</text>

  <path class="line" d="M800 745 C920 745, 1030 745, 1120 745" />
  <text class="label" x="925" y="732">1 to many</text>

  <path class="line" d="M800 845 C920 845, 1030 845, 1120 845" />
  <text class="label" x="925" y="832">1 to many</text>

  <path class="line" d="M1430 585 C1490 585, 1510 585, 1570 585" />
  <text class="label" x="1460" y="572">1 to many</text>

  <g transform="translate(60,140)">
    <rect class="card" width="270" height="140" />
    <text class="title" x="18" y="34">HOSTEL</text>
    <text class="meta" x="18" y="58">Table: grievance_hostel</text>
    <text class="field" x="18" y="92">PK hostel_id : integer</text>
    <text class="field" x="18" y="118">name : varchar(100)</text>
  </g>

  <g transform="translate(460,120)">
    <rect class="card" width="340" height="190" />
    <text class="title" x="18" y="34">STUDENT</text>
    <text class="meta" x="18" y="58">Table: grievance_student</text>
    <text class="field" x="18" y="92">PK roll : varchar(20)</text>
    <text class="field" x="18" y="118">name : varchar(100)</text>
    <text class="field" x="18" y="144">mail : varchar</text>
    <text class="field" x="18" y="170">mobile : varchar(15)</text>
    <text class="field" x="18" y="196">FK hostel_id : integer</text>
  </g>

  <g transform="translate(1120,120)">
    <rect class="card" width="310" height="330" />
    <text class="title" x="18" y="34">COMPLAINT</text>
    <text class="meta" x="18" y="58">Table: grievance_complaint</text>
    <text class="field" x="18" y="92">PK complaint_id : serial</text>
    <text class="field" x="18" y="118">title : text</text>
    <text class="field" x="18" y="144">description : text</text>
    <text class="field" x="18" y="170">attachment : varchar</text>
    <text class="field" x="18" y="196">created_date : timestamptz</text>
    <text class="field" x="18" y="222">solved_date : timestamptz</text>
    <text class="field" x="18" y="248">cost : numeric(10,2)</text>
    <text class="field" x="18" y="274">FK student_id : varchar(20)</text>
    <text class="field" x="18" y="300">FK hostel_id : integer</text>
    <text class="field" x="18" y="326">FK status_id / cat_id / solved_by_id</text>
  </g>

  <g transform="translate(60,520)">
    <rect class="card" width="270" height="140" />
    <text class="title" x="18" y="34">STATUS</text>
    <text class="meta" x="18" y="58">Table: grievance_status</text>
    <text class="field" x="18" y="92">PK status_id : serial</text>
    <text class="field" x="18" y="118">status_name : varchar(20)</text>
  </g>

  <g transform="translate(460,460)">
    <rect class="card" width="340" height="160" />
    <text class="title" x="18" y="34">CATEGORY</text>
    <text class="meta" x="18" y="58">Table: grievance_category</text>
    <text class="field" x="18" y="92">PK cat_id : integer</text>
    <text class="field" x="18" y="118">cat_name : varchar(100)</text>
  </g>

  <g transform="translate(1120,470)">
    <rect class="card" width="310" height="170" />
    <text class="title" x="18" y="34">TECHNICAL_WORKER</text>
    <text class="meta" x="18" y="58">Table: grievance_technicalworker</text>
    <text class="field" x="18" y="92">PK worker_id : integer</text>
    <text class="field" x="18" y="118">name : varchar(100)</text>
    <text class="field" x="18" y="144">FK cat_id : integer</text>
  </g>

  <g transform="translate(60,900)">
    <rect class="card" width="270" height="140" />
    <text class="title" x="18" y="34">DESIGNATION</text>
    <text class="meta" x="18" y="58">Table: grievance_designation</text>
    <text class="field" x="18" y="92">PK desig_id : serial</text>
    <text class="field" x="18" y="118">desig_name : varchar(50)</text>
  </g>

  <g transform="translate(60,680)">
    <rect class="card" width="270" height="140" />
    <text class="title" x="18" y="34">STAFF_STATUS</text>
    <text class="meta" x="18" y="58">Table: grievance_staffstatus</text>
    <text class="field" x="18" y="92">PK staff_status_id : serial</text>
    <text class="field" x="18" y="118">status_name : varchar(20)</text>
  </g>

  <g transform="translate(460,660)">
    <rect class="card" width="340" height="240" />
    <text class="title" x="18" y="34">STAFF</text>
    <text class="meta" x="18" y="58">Table: grievance_staff</text>
    <text class="field" x="18" y="92">PK emp_id : integer</text>
    <text class="field" x="18" y="118">name : varchar(100)</text>
    <text class="field" x="18" y="144">mail : varchar</text>
    <text class="field" x="18" y="170">mobile : varchar(15)</text>
    <text class="field" x="18" y="196">first_login : boolean</text>
    <text class="field" x="18" y="222">FK desig_id / hostel_id / staff_status_id</text>
  </g>

  <path class="line" d="M330 985 C380 985, 410 845, 460 785" />
  <text class="label" x="350" y="930">1 to many</text>

  <path class="line" d="M330 585 C380 585, 410 285, 1120 285" />
  <text class="label" x="640" y="250">status on complaint</text>

  <path class="line" d="M800 785 C930 785, 1020 350, 1120 350" />
  <text class="label" x="915" y="610">solved_by</text>

  <path class="line" d="M330 205 C380 205, 930 405, 1120 405" />
  <text class="label" x="690" y="430">hostel on complaint</text>

  <text class="subheading" x="60" y="1135">Open this SVG directly in VS Code or any browser for a visual schema map.</text>
  <text class="subheading" x="60" y="1165">Main FK paths: Student -> Hostel, Staff -> Designation/Hostel/StaffStatus, Complaint -> Student/Hostel/Status/Category/Staff, TechnicalWorker -> Category.</text>
</svg>
