{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
<link rel="stylesheet" href="{% static 'index.css' %}?v=native_olive">
</head>

<body>

<div class="container">

<h2>Student Registration</h2>

<input id="userId" placeholder="Roll Number">
<input id="name" placeholder="Full Name">
<input id="mail" placeholder="Email">
<input id="mobile" placeholder="Mobile Number">
<input id="password" type="password" placeholder="Password">

<select id="hostel">
    <option value="" disabled selected>Select Your Hostel</option>
    <option value="1">Hostel A</option>
    <option value="2">Hostel B</option>
    <option value="3">Hostel C</option>
</select>

<button onclick="registerStudent()">Create Account</button>

<p>Already registered?
<a href="{% url 'login_page' %}">Login Here</a>
</p>

</div>

<script>
function registerStudent(){
    let roll = document.getElementById("userId").value;
    let name = document.getElementById("name").value;
    let mail = document.getElementById("mail").value;
    let mobile = document.getElementById("mobile").value;
    let password = document.getElementById("password").value;
    let hostelId = parseInt(document.getElementById("hostel").value);

    if(!roll || !name || !password || isNaN(hostelId)){
        alert("Please fill in all required fields and select a hostel.");
        return;
    }

    fetch("{% url 'signup' %}",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            roll: roll,
            name: name,
            mail: mail,
            pswd: password,
            mobile: mobile,
            hostel_id: hostelId
        })
    })
    .then(res => res.json())
    .then(data=>{
        if(data.success){
            alert("Student Registered Successfully!");
            window.location = "{% url 'login_page' %}";
        } else {
            alert("Registration Failed: " + (data.error || "Check your details"));
        }
    });
}
</script>
</body>
</html>
