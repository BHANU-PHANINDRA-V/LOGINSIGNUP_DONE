{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint</title>
    <link rel="stylesheet" href="{% static 'index.css' %}?v=native_olive">
</head>
<body>
        
<div class="container">
    <h2>Register Complaint</h2>
    
    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    
    <select id="category">
        <option value="" disabled selected>Select Category</option>
        <option value="Electrical">Electrical</option>
        <option value="Water">Water</option>
        <option value="Furniture">Furniture</option>
        <option value="Civil">Civil</option>
        <option value="Network">Network</option>
        <option value="Sanitation">Sanitation</option>
    </select>

    <select id="hostel">
        <option value="" disabled selected>Select Your Hostel</option>
        <option value="1">Hostel A</option>
        <option value="2">Hostel B</option>
        <option value="3">Hostel C</option>
    </select>
    
    <input type="file" id="photo">
    
    <button onclick="addComplaint()">Submit</button>
</div>

<script>
function addComplaint(){
    let rollNumber = sessionStorage.getItem("roll");
    if(!rollNumber){
        alert("You must be logged in to register a complaint.");
        window.location = "{% url 'login_page' %}";
        return;
    }

    let title = document.getElementById("title").value;
    let desc = document.getElementById("desc").value;
    let category = document.getElementById("category").value;
    let hostelId = parseInt(document.getElementById("hostel").value);

    if(!title || !desc || !category || isNaN(hostelId)){
        alert("Please fill in all fields and select a hostel.");
        return;
    }

    fetch("{% url 'register_complaint' %}",{
        method: "POST",
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            roll: rollNumber,
            title: title,
            description: desc,
            category: category,
            hostel_id: hostelId
        })
    })
    .then(response => {
        if(!response.ok) throw new Error("Server Error");
        return response.json();
    })
    .then(d => {
        if(d.success){
            // Save the ID in session storage to use on the next page
            sessionStorage.setItem("complaint_id", d.complaint_id);
            
            // Redirect to the dedicated success page!
            window.location = "{% url 'complaint_success' %}"; 
        } else {
            alert("Failed to register complaint. " + (d.error || ""));
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("An error occurred. Make sure your category exactly matches the database!");
    });
}
</script>
</body>
</html>
