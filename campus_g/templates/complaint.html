{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint</title>
    <link rel="stylesheet" href="{% static 'index.css' %}">
</head>
<body>
        
<div class="container">
    <h2>Register Complaint</h2>
    
    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    
    <select id="category">
        <option>Electrical</option>
        <option>Water</option>
        <option>Furniture</option>
        <option>Civil</option>
        <option>Network</option>
        <option>Sanitation</option>
    </select>
    
    <input type="file" id="photo">
    
    <button onclick="addComplaint()">Submit</button>
</div>

<script>
function addComplaint(){
    // 1. Check if the user is actually logged in
    let rollNumber = sessionStorage.getItem("roll");
    if(!rollNumber){
        alert("You must be logged in to register a complaint.");
        window.location = "{% url 'login_page' %}";
        return;
    }

    // 2. Safe fetch with proper error catching
    fetch("{% url 'register_complaint' %}",{
        method: "POST",
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            roll: rollNumber,
            title: document.getElementById("title").value,
            description: document.getElementById("desc").value,
            category: document.getElementById("category").value
        })
    })
    .then(response => {
        if(!response.ok) throw new Error("Server Error");
        return response.json();
    })
    .then(d => {
        if(d.success){
            sessionStorage.setItem("complaint_id", d.complaint_id);
            // Replaces the form with a success message
            document.querySelector(".container").innerHTML = `
                <h2>Complaint Registered Successfully ✅</h2>
                <p>Your Complaint ID is:</p>
                <h1>${d.complaint_id}</h1>
                <button onclick="window.location='{% url 'student_page' %}'">Go to Dashboard</button>
            `;
        } else {
            alert("Failed to register complaint. Please check your details.");
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("An error occurred. Make sure the category matches your database exactly!");
    });
}
</script>
</body>
</html>
