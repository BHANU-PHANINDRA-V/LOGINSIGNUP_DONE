{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="{% static 'index.css' %}?v=native_olive">
</head>
<body>

<div class="container">
    <h2 id="title">Student Login</h2>
    
    <div class="role-buttons">
        <button onclick="setRole('student')">Student</button>
        <button onclick="setRole('staff')">Staff</button>
    </div>

    <input id="username" placeholder="Enter Roll Number">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <p>Don't have an account?
    <a href="{% url 'signin_page' %}">
        <button type="button">Sign Up</button>
    </a>
    </p>
</div>

<script>
let currentRole = "student";

function setRole(role){
    currentRole = role;
    if(role === "staff"){
        document.getElementById("title").innerText = "Staff Login";
        document.getElementById("username").placeholder = "Enter Employee ID";
    } else {
        document.getElementById("title").innerText = "Student Login";
        document.getElementById("username").placeholder = "Enter Roll Number";
    }
}

function loginUser(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(!username || !password){
        alert("Please enter both your ID and password.");
        return;
    }

    if(currentRole === "student"){
        // Student Roll Numbers are strings (e.g., "21BCE001")
        fetch("{% url 'login' %}",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ roll: username, pswd: password })
        })
        .then(res => {
            if(!res.ok) throw new Error("Server Error");
            return res.json();
        })
        .then(data=>{
            if(data.success){
                sessionStorage.setItem("roll", username);
                sessionStorage.setItem("role", "student");
                window.location = "{% url 'student_page' %}"; 
            } else {
                alert("Invalid Student Credentials");
            }
        })
        .catch(err => {
            console.error("Error:", err);
            alert("Could not connect to the server.");
        });

    } else {
        // Staff Employee IDs are integers in your database
        let empIdInt = parseInt(username);
        
        if(isNaN(empIdInt)){
            alert("Employee ID must be a number.");
            return;
        }

        fetch("{% url 'staff_login' %}",{
            method:"POST",
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ emp_id: empIdInt, pswd: password })
        })
        .then(res => {
            if(!res.ok) throw new Error("Server Error");
            return res.json();
        })
        .then(data=>{
            if(data.success){
                sessionStorage.setItem("emp_id", username);
                sessionStorage.setItem("role", "staff");
                window.location = "{% url 'staff_page' %}"; 
            } else {
                alert("Invalid Staff Credentials");
            }
        })
        .catch(err => {
            console.error("Error:", err);
            alert("Could not connect to the server.");
        });
    }
}
</script>

</body>
</html>
