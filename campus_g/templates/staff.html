{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="{% static 'index.css' %}" />
  </head>
  <body>
    <div class="container">
      <h2>Staff Dashboard</h2>
      <input id="search" placeholder="Enter Complaint ID" />
      <button onclick="searchComplaint()">Check Status</button>
      
      <div class="my_complaints">
        <div class="box solved">
          <button onclick="viewComplaints('Solved')">Solved</button>
        </div>
        <div class="box inprogress">
          <button onclick="viewComplaints('In Progress')">In Progress</button>
        </div>
        <div class="box pending">
          <button onclick="viewComplaints('Pending')">Pending</button>
        </div>
      </div>
      <div id="staffBox"></div>
    </div>

    <script>
      // 1. Authentication Check
      let empId = sessionStorage.getItem("emp_id");

      if (!empId) {
        alert("Please login first");
        window.location = "{% url 'login_page' %}";
      }

      function viewComplaints(status) {
        let box = document.getElementById("staffBox");
        
        if (status === "Solved") {
          box.innerHTML = "<h3>Solved Complaints</h3>";
        } else if (status === "In Progress") {
          box.innerHTML = "<h3>In Progress Complaints</h3>";
        } else {
          box.innerHTML = "<h3>Pending Complaints</h3>";
        }
        
        // FIX: Safely call the STAFF endpoint using empId
        const complaintsUrl = "{% url 'staff_complaints' 'emp-placeholder' %}".replace("emp-placeholder", empId);
        
        fetch(complaintsUrl)
          .then((response) => response.json())
          .then((allData) => {
            
            // FIX: The backend gives us ALL complaints for this category. We must filter them by the requested status.
            const data = allData.filter(c => c.status === status);

            if (data.length === 0) {
                box.innerHTML += `<p>No complaints found for this status.</p>`;
                return;
            }

            if (status === "Solved") {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
            </div>`;
              });
            } else if (status === "In Progress") {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
                <button onclick="update(${c.id},'Solved')">Mark as Solved</button>
            </div>`;
              });
            } else {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
                <button onclick="update(${c.id},'In Progress')">Mark In Progress</button>
                <button onclick="update(${c.id},'Solved')">Mark as Solved</button>
            </div>`;
              });
            }
          })
          .catch(err => {
              console.error(err);
              box.innerHTML += `<p>Error loading complaints.</p>`;
          });
      }

      function update(id, status) {
        // Safe fetch with no variables in the Django tag
        fetch("{% url 'update_status' %}", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: id, status: status }),
        }).then(() => location.reload()); // Reloads page to show updated status
      }

      function searchComplaint() {
        let cid = document.getElementById("search").value;

        if (cid === "") {
          alert("Please enter Complaint ID");
          return;
        }

        // Safe URL generation
        const searchUrl = "{% url 'search_complaint' 0 %}".replace("/0/", `/${cid}/`);
        fetch(searchUrl)
          .then((response) => response.json())
          .then((data) => {
            if (data.found) {
              alert("Complaint Status: " + data.status);
            } else {
              alert("Complaint Not Found");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("Server Error");
          });
      }
    </script>
  </body>
</html>
