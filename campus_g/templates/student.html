{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
   <link rel="stylesheet" href="{% static 'index.css' %}">
</head>
<body>
        
<div class="container">
    <h2>Student Dashboard</h2>
    <input id="search" placeholder="Enter Complaint ID">
    <button onclick="searchComplaint()">Check Status</button>
    <hr>
    <button onclick="location='{% url 'complaint_page' %}'">Register New Complaint</button>
</div>

<div class="my_complaints">
    <div class="box solved">
        <button onclick="viewComplaints('Solved')">Solved</button>
    </div>
    <div class="box inprogress">
        <button onclick="viewComplaints('In Progress')">In Progress</button>
    </div>
    <div class="box pending">
        <button onclick="viewComplaints('Pending')">Pending</button>
    </div>
</div>

<div id="staffBox">
    complaints are to be displayed here.
</div>

<script>
function searchComplaint(){
    let cid = document.getElementById("search").value;

    if(cid === ""){
        alert("Please enter Complaint ID");
        return;
    }

    // SAFE FETCH: No Django tags here, just pure JavaScript template literals
    fetch(`/search_complaint/${cid}/`)
    .then(response => {
        if(!response.ok) throw new Error("Server Error");
        return response.json();
    })
    .then(data => {
        if(data.found){
            alert("Complaint Status: " + data.status);
        }else{
            alert("Complaint Not Found");
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Server Error");
    });
}

function viewComplaints(status){
    let box = document.getElementById("staffBox");
    if(status === "Solved"){
        box.innerHTML = "<h3>Solved Complaints</h3>";
    } else if(status === "In Progress"){
        box.innerHTML = "<h3>In Progress Complaints</h3>";
    } else {
        box.innerHTML = "<h3>Pending Complaints</h3>";
    }
    
    let sid = sessionStorage.getItem("roll");
    
    // SAFE FETCH: No Django tags here either!
    fetch(`/student_complaints/${sid}/${status}/`)
    .then(response => {
        if(!response.ok) throw new Error("Server Error");
        return response.json();
    })
    .then(data => {
        if(data.length === 0){
            box.innerHTML += `<p>No complaints found for this status.</p>`;
            return;
        }

        data.forEach(c => {
            box.innerHTML += `
            <div class="block">
                 <h3>ID: ${c.id}</h3>
                 <h3>TITLE: ${c.title}</h3>
                 <p>Status: ${c.status}</p>
            </div>`;
        });
    })
    .catch(error => {
        console.error("Error:", error);
        box.innerHTML += `<p>Error loading complaints.</p>`;
    });
}
</script>

</body>
</html>
