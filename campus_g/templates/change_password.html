{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandatory Password Update</title>
    <link rel="stylesheet" href="{% static 'index.css' %}?v=native_olive">
</head>
<body>

<div class="container">
    <h2>Action Required</h2>
    
    <div style="background: #fff3e0; padding: 15px; border-left: 4px solid #ed6c02; border-radius: 4px; margin-bottom: 20px;">
        <p style="color: #ed6c02; margin: 0; text-align: left; font-weight: bold;">⚠️ Security Notice</p>
        <p style="color: #333; margin: 5px 0 0 0; text-align: left; font-size: 0.9em;">
            This is your first time logging in. For security purposes, you must change your temporary Admin-assigned password before accessing the Staff Dashboard.
        </p>
    </div>

    <input type="password" id="new_pswd" placeholder="Enter New Secure Password">
    <input type="password" id="confirm_pswd" placeholder="Confirm New Password">

    <button onclick="changePassword()">Save & Continue to Dashboard</button>
</div>

<script>
    // 1. Grab the Employee ID that was saved during the initial login step
    let empId = sessionStorage.getItem("emp_id");
    
    // If they somehow got to this page without logging in, kick them out
    if (!empId) {
        window.location = "{% url 'login_page' %}";
    }

    function changePassword() {
        let pswd1 = document.getElementById("new_pswd").value;
        let pswd2 = document.getElementById("confirm_pswd").value;

        if(!pswd1 || !pswd2) {
            alert("Please fill in both fields.");
            return;
        }

        if(pswd1 !== pswd2) {
            alert("Passwords do not match! Please try again.");
            return;
        }

        // 2. Send the new password to your Django backend
        fetch("{% url 'update_password' %}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ emp_id: empId, new_pswd: pswd1 })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                alert("Password updated successfully! Welcome to the portal.");
                // 3. Send them to the actual Staff Dashboard!
                window.location = "{% url 'staff_page' %}";
            } else {
                alert("Error updating password: " + data.error);
            }
        });
    }
</script>

</body>
</html>
