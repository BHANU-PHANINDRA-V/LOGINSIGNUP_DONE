{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Success</title>
    <link rel="stylesheet" href="{% static 'index.css' %}?v=campus_suite_v5">
</head>
<body>
<main class="page-shell">
    <section class="container medium">
        <div class="success-hero">
            <span class="success-badge">OK</span>

            <div>
                <span class="eyebrow">Submission Complete</span>
                <h1 class="page-title">Your complaint has been registered successfully.</h1>
                <p class="page-subtitle">
                    Keep this complaint reference for follow-up. You can also return to the student dashboard and
                    open the complaint from your status view.
                </p>
            </div>

            <div class="notice-card">
                <span class="metric-label">Complaint Reference</span>
                <div class="ticket-id" id="cid">#0000</div>
                <div class="meta-inline">
                    <span class="meta-pill">Date: <strong id="cdate"></strong></span>
                    <span class="meta-pill">Time: <strong id="ctime"></strong></span>
                </div>
            </div>

            <div class="action-row">
                <button class="inline" onclick="window.location='{% url 'student_page' %}'">Go to Dashboard</button>
            </div>
        </div>
    </section>
</main>

<script>
let complaintId = sessionStorage.getItem("complaint_id");
document.getElementById("cid").innerText = "#" + (complaintId || "ERROR");

let now = new Date();
document.getElementById("cdate").innerText = now.toLocaleDateString();
document.getElementById("ctime").innerText = now.toLocaleTimeString();
</script>
</body>
</html>
