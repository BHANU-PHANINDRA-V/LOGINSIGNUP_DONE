<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>staff</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <h2>Staff Dashboard</h2>
      <input id="search" placeholder="Enter Complaint ID" />
      <button onclick="searchComplaint()">Check Status</button>
      <div class="my_complaints">
        <div class="box solved">
          <button onclick="viewComplaints('Solved')">Solved</button>
        </div>
        <div class="box inprogress">
          <button onclick="viewComplaints('In Progress')">In Progress</button>
        </div>
        <div class="box pending">
          <button onclick="viewComplaints('Pending')">Pending</button>
        </div>
      </div>
      <div id="staffBox"></div>
    </div>
    <script>
      let empId = sessionStorage.getItem("emp_id");

      if (!empId) {
        alert("Please login first");
        window.location = "login.html";
      }

      function viewComplaints(status) {
        let box = document.getElementById("staffBox");
        if (status === "Solved") {
          box.innerHTML = "<h3>Solved Complaints</h3>";
        } else if (status === "In Progress") {
          box.innerHTML = "<h3>In Progress Complaints</h3>";
        } else {
          box.innerHTML = "<h3>Pending Complaints</h3>";
        }
        let sid = sessionStorage.getItem("roll");
        fetch(`http://127.0.0.1:8000/student_complaints/${sid}/${status}/`)
          .then((response) => response.json())
          .then((data) => {
            if (status === "Solved") {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
                
            </div>`;
              });
            } else if (status === "In Progress") {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
                <button onclick="update(${c.id},'Solved')">Solved</button>
            </div>`;
              });
            } else {
              data.forEach((c) => {
                box.innerHTML += `
            <div class="block">
                <h3> ID:   ${c.id}</h3>
                <h3>TITLE: ${c.title}</h3>
                <p>Status: ${c.status}</p>
                <button onclick="update(${c.id},'In Progress')">mark In Progress</button>
                <button onclick="update(${c.id},'Solved')">Solved</button>
            </div>`;
              });
            }
          });
      }
      function update(id, status) {
        fetch("http://127.0.0.1:8000/update_status/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: id, status: status }),
        }).then(() => location.reload());
      }
      function searchComplaint() {
        let cid = document.getElementById("search").value;

        if (cid === "") {
          alert("Please enter Complaint ID");
          return;
        }

        fetch(`http://127.0.0.1:8000/search_complaint/${cid}/`)
          .then((response) => response.json())
          .then((data) => {
            if (data.found) {
              alert("Complaint Status: " + data.status);
            } else {
              alert("Complaint Not Found");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            alert("Server Error");
          });
      }
    </script>
  </body>
</html>
