<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="container">

<h2 id="title">Student Login</h2>

<div class="role-buttons">
    <button onclick="setRole('student')">Student</button>
    <button onclick="setRole('staff')">Staff</button>
</div>

<input id="username" placeholder="Enter Roll Number">
<input type="password" id="password" placeholder="Password">

<button onclick="loginUser()">Login</button>

<p>Don't have an account?
<a href="signin.html">Sign Up</a>
</p>

</div>

<script>

let currentRole = "student";

function setRole(role){
    currentRole = role;

    if(role === "staff"){
        document.getElementById("title").innerText = "Staff Login";
        document.getElementById("username").placeholder = "Enter Employee ID";
    } else {
        document.getElementById("title").innerText = "Student Login";
        document.getElementById("username").placeholder = "Enter Roll Number";
    }
}

function loginUser(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(currentRole === "student"){

    fetch("http://127.0.0.1:8000/login/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            roll: username,
            pswd: password
        })
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Server Error: " + res.status);
        }
        return res.json();
    })
    .then(data=>{
        if(data.success){
            sessionStorage.setItem("roll", username);
            sessionStorage.setItem("role", "student");
            window.location="student.html";
        } else {
            alert("Invalid Student Credentials");
        }
    })
    .catch(err=>{
        console.error(err);
        alert("Login failed");
    });

}else{

    fetch("http://127.0.0.1:8000/staff_login/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            emp_id: username,
            pswd: password
        })
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Server Error: " + res.status);
        }
        return res.json();
    })
    .then(data=>{
        if(data.success){
            sessionStorage.setItem("emp_id", username);
            sessionStorage.setItem("role", "staff");
            window.location="staff.html";
        } else {
            alert("Invalid Staff Credentials");
        }
    })
    .catch(err=>{
        console.error(err);
        alert("Login failed");
    });

}

}

</script>

</body>
</html>
